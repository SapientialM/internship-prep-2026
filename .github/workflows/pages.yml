# 自动部署 Hexo 到 GitHub Pages
# 每次 push 到 main 分支时触发

name: Deploy Hexo to GitHub Pages

on:
  # 触发条件：push到main分支
  push:
    branches:
      - main
  # 允许手动触发
  workflow_dispatch:

# 权限设置
permissions:
  contents: write    # 需要写入权限来推送到部署分支
  pages: write
  id-token: write

# 并发控制
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建任务
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Hexo Theme
        run: |
          # 安装 NexT 主题
          npm install hexo-theme-next
          # 复制主题到 themes 目录
          mkdir -p themes/next
          cp -r node_modules/hexo-theme-next/* themes/next/ || true

      - name: Build Hexo
        run: npm run build

      # ==========================================
      # 方案1: 部署到 gh-pages 分支（GitHub Pages默认）
      # ==========================================
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages    # 部署目标分支，可修改
          
      # ==========================================
      # 方案2: 如果你想部署到其他分支，比如 "main" 或 "master"
      # ==========================================
      # - name: Deploy to main branch (docs folder)
      #   uses: peaceiris/actions-gh-pages@v3
