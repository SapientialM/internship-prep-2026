# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html
# Source: https://github.com/hexojs/hexo/

# Site
title: 2026暑期实习备战笔记
subtitle: '知识清单 | 技术笔记 | 项目笔记 | 面经记录'
description: '一个全面的技术知识仓库，涵盖计算机基础、算法、后端开发、项目经验、面经记录等内容'
keywords: [实习, 面试, 算法, Java, 后端, 计算机基础, 面经]
author: 'SapientialM'
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://SapientialM.github.io/internship-prep-2026
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: next

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
## 
## 注意：如果你使用 GitHub Actions 自动部署，不需要修改这里的配置
## 如果你使用 hexo deploy 手动部署，请修改为你要部署的分支
##
deploy:
  type: git
  repo: git@github.com:SapientialM/internship-prep-2026.git
  branch: gh-pages    # 部署目标分支，可改为 main、master 等
  
## =============================================
## 部署分支说明（GitHub Pages 支持的方式）：
## =============================================
## 
## 方式1: gh-pages 分支（默认推荐）
##   - branch: gh-pages
##   - 这是 GitHub Pages 的经典方式
##   - 源代码和生成的网站分开存放
## 
## 方式2: main/master 分支 + docs 文件夹
##   - 在 GitHub 仓库设置中，选择 "Deploy from a branch"
##   - 选择 main/master 分支，文件夹选择 "/docs"
##   - 这里的配置改为 branch: main
##   - 同时修改上面的 public_dir: docs
##
## 方式3: GitHub Actions（本仓库使用的方式）
##   - 不需要修改这里的配置
##   - 在 .github/workflows/pages.yml 中配置部署分支
##   - 详见 README_DEV.md

# Search
search:
  path: search.xml
  field: post
  content: true
  format: html

# Sitemap
sitemap:
  path: sitemap.xml
  rel: false
  tags: true
  categories: true
